<!DOCTYPE html>
<html>
<head>
<style>
table{
    border-collapse: collapse;
    width:100%;
    text-align:center;
}
th,td{
    border:2px solid black;
    padding:15px;
}
</style>
</head>
<body>

<table>
    <tr>
        <th>Day / Lecture</th>
        <th>1</th>
        <th>2</th>
        <th>3</th>
        <th></th>
        <th>4</th>
        <th>5</th>
    </tr>

    <tr>
        <td>Monday</td>
        <td>C++</td>
        <td>HTML</td>
        <td>CSS</td>
        <td rowspan="5">Break</td>
        <td>Java</td>
        <td>C++</td>
    </tr>

    <tr>
        <td>Tuesday</td>
        <td rowspan="2">ENG</td>
        <td colspan="2">Web Dev</td>
        <td colspan="2">JS</td>
    </tr>

    <tr>
        <td>Wednesday</td>
        <td colspan="2">C++</td>
        <td>HTML</td>
        <td>OS</td>
    </tr>

    <tr>
        <td>Thursday</td>
        <td colspan="3">Java</td>
        <td>Eng</td>
        <td>Computer Networks</td>
    </tr>

    <tr>
        <td>Friday</td>
        <td colspan="3">Data Science</td>
        <td>C++</td>
        <td>JS</td>
    </tr>

</table>

</body>
</html>
