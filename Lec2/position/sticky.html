<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>5. Sticky Position</title>
    <style>
        body { height: 1500px; background-color: #f9f9f9; margin: 0; padding: 20px; }
        
        .header { background-color: #333; color: white; padding: 30px; text-align: center; }

        .sticky-navbar {
            position: sticky;
            top: 0; /* Locks to the very top line of the browser window upon scroll */
            background-color: #2ecc71;
            color: white;
            padding: 15px;
            font-weight: bold;
            text-align: center;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="header"><h1>My Website Header</h1></div>

    <div class="sticky-navbar">
        I am sticky. Scroll past me and I will lock right at the top edge of the window!
    </div>

    <div style="margin-top: 20px;">
        <p>Keep scrolling down to test my sticky transition point...</p>
        <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit...</p>
    </div>
</body>
</html>
