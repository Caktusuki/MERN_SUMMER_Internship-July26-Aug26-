<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>4. Fixed Position</title>
    <style>
        body { height: 1500px; background-color: #f4f4f4; padding: 20px; }

        .fixed-badge {
            position: fixed;
            background-color: #9b59b6;
            color: white;
            padding: 15px;
            font-weight: bold;
            bottom: 30px; /* Stuck 30px from the bottom edge of your screen */
            right: 30px;  /* Stuck 30px from the right edge of your screen */
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h2>Fixed Positioning</h2>
    <p>Scroll down the page! Watch the text scroll away while the purple box stays perfectly frozen on your monitor.</p>
    
    <div class="fixed-badge">
        I am fixed. I stick here forever!
    </div>
</body>
</html>
