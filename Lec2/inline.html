<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Meta tags for character encoding and mobile responsiveness -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline CSS</title>

    <!-- Internal CSS Style Tag -->
    <style>
        div {
            /* FIXED: Removed the duplicate semicolon here */
            color: red; 
            
            /* Sets the background color of the div to aquamarine */
            background-color: aquamarine;
        }
    </style>
</head>
<body>

    <!-- The target element styled by the internal CSS above -->
    <div>
        I m a div tag
    </div>

</body>
</html>
