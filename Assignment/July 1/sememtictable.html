<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment</title>
</head>
<body>
<body>
    <header>
        <h1>Registration Portal</h1>
    </header>
    <main>
        <table border="2">
            <thead>
                <tr>
                    <th>Class</th>
                    <th>Time</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>DSA</td>
                    <td>9:00 AM</td>
                </tr>
            </tbody>
        </table>
        <br>
        <form>
            <label for="name">Name:</label>
            <input type="text" id="name" required>
            
            <br><br>
            
            <label for="course">Course:</label>
            <select id="course">
                <option>HTML</option>
                <option>CSS</option>
            </select>
            
            <br><br>
            
            <button type="submit">Submit</button>
        </form>

    </main>

    <footer>
        <p>Page Footer</p>
    </footer>
</body>
</html>
